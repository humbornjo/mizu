<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Elements in HTML</title>
    <!-- Embed elements Elements via Web Component -->
    <script src="https://unpkg.com/@stoplight/elements@9.0.24/web-components.min.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@stoplight/elements@9.0.24/styles.min.css"
    />
  </head>
  <body>
    <elements-api id="elements" router="hash" layout="sidebar"></elements-api>
    <script>
      const doc = document.getElementById("elements");
      doc.apiDescriptionDocument = {{.Document}};
    </script>
  </body>
</html>
